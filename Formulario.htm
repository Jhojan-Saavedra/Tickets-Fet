<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximun-scale=1.0, minimun-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>TICKETS</title>
    <meta name="description" content="Sistema de tickets para inventario">
    <meta name="keywords" content="tickets, inventario, sistema">
    <meta name="author" content="Jhojan Steven Saavedra Chantris">
    <link rel="Shortcut icon" href="img/icon.png">
    <link rel="icon" type="image/png" href="img/icon.png?v=2">
    <link rel="stylesheet" href="css/default.css" type="text/css">
    <script src="https://kit.fontawesome.com/9d1a86738f.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <img src="img/logo.png" alt="Inicio" class="logo">
        <h1>TICKETS</h1>
        <i class=" menu fa-solid fa-bars"></i>
    </header>
    <main>
        <form action="" class="form-login" method="post">
            <input  class="input-login" type="email" placeholder="Email" maxlength="50" minlength="4" title="Introduce tu Correo Electronico" pattern="[a-zA-Z0-9]+([.][a-zA-Z0-9_]+)*@[a-zA-Z0-9_]+([.][a-zA-Z0-9_]+)*[.][a-zA-Z]{1,5}" required>
            <input class="input-login" type="password" placeholder="Contraseña ..." maxlength="25" minlength="8" title="Intrododuce tu contraseña" pattern="{8,25}" required >
            <input class="btn-enviar" type="submit" value="Enviar">
        </form>
    </main>
    <footer>
        <small>Sopita &copy; 2026</small>
    </footer>
</body>
</html>
